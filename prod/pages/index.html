<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>⚡ InstantVM</title>
<link rel="stylesheet" href="ui/css/vars.css">
<link rel="stylesheet" href="ui/css/responsive.css">
<script src="v86/libv86.js"></script>
</head>
<body>
<div class="screen">
  <div id="launcher"></div>
  <div id="vm-screen"></div>
</div>
<div class="bar" id="bar"></div>

<script src="vm/render/bar.js"></script>
<script src="vm/render/screen.js"></script>
<script src="vm/render/launcher.js"></script>
<script src="vm/core/boot.js"></script>
<script src="vm/compute/gpu.js"></script>
<script src="vm/compute/panel.js"></script>
<script src="vm/sandbox-bridge.js"></script>
<script>
function launch(id) {
  bootVM(id);
  history.replaceState(null, '', '?os=' + id);
}
var _s = stopVM;
stopVM = function() { _s(); history.replaceState(null, '', location.pathname); };

(async function() {
  await loadConfig();
  renderBar();
  renderLauncher();
  renderGPUPanel();

  // Poll for live sandbox state from GitHub Issues
  bridgeRead().then(function(states) {
    var keys = Object.keys(states);
    if (keys.length) {
      var el = document.getElementById('state');
      if (el) el.textContent = '● ' + keys.length + ' sandbox(es) online';
    }
  });
  bridgeStartPoll(function(states) {
    var el = document.getElementById('state');
    var n = Object.keys(states).length;
    if (el && n && !VM.emulator) el.textContent = '● ' + n + ' sandbox(es) online';
  });

  var os = new URLSearchParams(location.search).get('os');
  if (os) launch(os);
})();
</script>
</body>
</html>
