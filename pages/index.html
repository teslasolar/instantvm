<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>⚡ InstantVM</title>
<link rel="stylesheet" href="ui/style.css">
<link rel="stylesheet" href="ui/desktop.css">
</head>
<body>

<div class="desktop M">
  <div id="splash">
    <div style="font-size:52px;margin-bottom:8px">⚡</div>
    <h1 style="font-size:22px;font-weight:700;color:var(--wh)">InstantVM</h1>
    <p style="color:var(--t2);font-size:9px;margin-top:4px">Disposable Windows VMs — click to launch</p>
    <p id="backend-badge" style="font-size:7px;margin-top:6px;color:var(--t2)">Checking backend...</p>

    <div class="app-grid" style="margin-top:20px">
      <div class="app-icon" onclick="launchApp('ignition')">
        <div class="ico">🔥</div><div class="lbl">Ignition Designer</div>
      </div>
      <div class="app-icon" onclick="launchApp('dev')">
        <div class="ico">🛠️</div><div class="lbl">Dev Sandbox</div>
      </div>
      <div class="app-icon" onclick="launchApp('plc')">
        <div class="ico">📐</div><div class="lbl">PLC Sim</div>
      </div>
      <div class="app-icon" onclick="launchApp('browser')">
        <div class="ico">🌐</div><div class="lbl">Clean Browser</div>
      </div>
    </div>
  </div>

  <div id="running" class="hidden" style="text-align:center">
    <div style="font-size:48px;margin-bottom:12px">🪟</div>
    <h2 id="running-name" style="font-size:16px;color:var(--wh)"></h2>
    <p style="color:var(--t2);font-size:9px;margin-top:6px">Windows Sandbox is running on your machine</p>
    <p style="color:var(--t2);font-size:8px;margin-top:4px">Close the Sandbox window to destroy the VM</p>
    <button class="btn" onclick="closeApp()" style="margin-top:12px;border-color:var(--er);color:var(--er)">■ Kill VM</button>
  </div>
</div>

<div class="taskbar" id="taskbar"></div>

<script src="vm/backend.js"></script>
<script src="vm/apps.js"></script>
<script src="vm/taskbar.js"></script>
<script>
renderTaskbar(); tickClock();
checkBackend().then(function() {
  var b = document.getElementById('backend-badge');
  if (backendOnline) {
    b.innerHTML = '<span style="color:var(--ok)">● Backend connected (localhost:8430)</span>';
  } else {
    b.innerHTML = '<span style="color:var(--er)">○ Backend offline</span><br>'
      +'<span style="color:var(--t2);font-size:6px">Run the Electron app: <code>cd instantvm && npm start</code></span>';
  }
});
</script>
</body>
</html>
